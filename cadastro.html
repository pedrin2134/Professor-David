<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#111827;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      width:350px;
      background:white;
      padding:30px;
      border-radius:15px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#16a34a;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#15803d;
    }

    p{
      text-align:center;
      margin-top:15px;
    }

    a{
      color:#2563eb;
      text-decoration:none;
    }

  </style>
</head>
<body>

  <div class="box">

    <h1>Cadastro</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <input type="email" id="email" placeholder="Seu email">

    <input type="password" id="senha" placeholder="Sua senha">

    <button onclick="cadastrar()">Cadastrar</button>

    <p>
      Já possui conta?
      <a href="login.html">Fazer login</a>
    </p>

  </div>

  <script>

    function cadastrar(){

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      if(nome === "" || email === "" || senha === ""){
        alert("Preencha todos os campos!");
        return;
      }

      const usuario = {
        nome,
        email,
        senha
      };

      localStorage.setItem("usuario", JSON.stringify(usuario));

      alert("Cadastro realizado!");

      window.location.href = "login.html";

    }

  </script>

</body>
</html>
